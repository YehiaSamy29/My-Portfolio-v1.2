<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with modern gradient -->
  <rect width="64" height="64" rx="14" fill="url(#bgGradient)"/>
  
  <!-- Subtle inner glow -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#innerGlow)" opacity="0.5"/>
  
  <!-- YS Text - Bold and modern -->
  <text x="32" y="44" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-2">YS</text>
  
  <!-- Cyan accent dot with glow -->
  <circle cx="52" cy="16" r="4" fill="#00D4FF">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="52" cy="16" r="6" fill="#00D4FF" opacity="0.3"/>
  
  <!-- Subtle border -->
  <rect x="1" y="1" width="62" height="62" rx="13" stroke="url(#borderGradient)" stroke-width="1.5" fill="none" opacity="0.4"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e2530"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    
    <!-- Inner glow -->
    <radialGradient id="innerGlow" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    
    <!-- Border gradient -->
    <linearGradient id="borderGradient" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
</svg>
